[platformio]
default_envs = esp32dev

[env]
platform = atmelavr
framework = arduino
monitor_speed = 115200
lib_deps =
  vshymanskyy/TinyGSM@^0.12.0
  bblanchon/ArduinoJson@^7.0.4
build_flags =
  -D TINY_GSM_RX_BUFFER=1024
  -D APEX_HOST_BAUD=115200
  -D APEX_MODEM_BAUD=9600
  -D APEX_BRIDGE_PORT=9000
  -D APEX_TELEMETRY_INTERVAL_MS=15000UL
  -D APEX_HEARTBEAT_INTERVAL_MS=30000UL
  -D APEX_DATA_RETRY_INTERVAL_MS=15000UL
  -D APEX_SMS_POLL_INTERVAL_MS=10000UL
  -D APEX_SLEEP_IDLE_MS=120000UL
  -D APEX_DATA_FAIL_THRESHOLD=3
  -D APEX_SIM800L

[env:uno]
platform = atmelavr
board = uno
framework = arduino
build_flags =
  ${env.build_flags}

[env:pico]
platform = raspberrypi
board = pico
framework = arduino
build_flags =
  ${env.build_flags}
  -D APEX_SIM7000G

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
build_flags =
  ${env.build_flags}
  -D APEX_SIM7000G
